<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录/注册 - 人工智能协会 · 党建文化平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .login-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-bottom: 2px solid transparent; }
    .login-tab.active { border-bottom-color: var(--red); color: var(--red); font-weight: 500; }
    .login-form { display: block; }
    .login-form.hidden { display: none; }
  </style>
</head>
<body>
  <!-- Toast -->
  <div id="toast"></div>

  <!-- Login/Register Page -->
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6b0000,#c90000,#165DFF);padding:20px;">
    <div class="login-box">
      <div class="login-logo">
        <a href="index.html" style="display:block;">
          <div class="login-logo-icon">★</div>
          <div class="login-title">人工智能协会党建平台</div>
          <div class="login-sub">用户登录 / 注册</div>
        </a>
      </div>

      <!-- 登录/注册切换标签 -->
      <div class="login-tabs">
        <div class="login-tab active" id="loginTab" onclick="switchToLogin()">登录</div>
        <div class="login-tab" id="registerTab" onclick="switchToRegister()">注册</div>
      </div>

      <!-- 登录表单 -->
      <div id="loginForm" class="login-form">
        <div class="login-hint">
          管理员账号：admin / 123456<br>
          普通用户账号：user / 123456
        </div>
        <div class="form-group">
          <label class="form-label">账号</label>
          <input class="form-input" id="loginUser" placeholder="请输入账号" value="admin">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input class="form-input" id="loginPass" type="password" placeholder="请输入密码" value="123456">
        </div>
        <button class="btn btn-red" style="width:100%;justify-content:center;padding:14px;" onclick="doLogin()">登 录</button>
        <button class="btn btn-outline" style="width:100%;justify-content:center;padding:12px;margin-top:12px;border-color:var(--red);color:var(--red);" onclick="doGuestLogin()">👤 访客登录（浏览功能）</button>
      </div>

      <!-- 注册表单 -->
      <div id="registerForm" class="login-form hidden">
        <div class="login-hint" style="color:var(--blue);">
          注册新用户，享受完整的学习和答题功能
        </div>
        <div class="form-group">
          <label class="form-label">用户名<span style="color:var(--red);"> *</span></label>
          <input class="form-input" id="registerUser" placeholder="请输入用户名（用于登录）">
        </div>
        <div class="form-group">
          <label class="form-label">密码<span style="color:var(--red);"> *</span></label>
          <input class="form-input" id="registerPass" type="password" placeholder="请输入密码（至少6位）">
        </div>
        <div class="form-group">
          <label class="form-label">确认密码<span style="color:var(--red);"> *</span></label>
          <input class="form-input" id="registerConfirmPass" type="password" placeholder="请再次输入密码">
        </div>
        <div class="form-group">
          <label class="form-label">真实姓名<span style="color:var(--red);"> *</span></label>
          <input class="form-input" id="registerName" placeholder="请输入真实姓名">
        </div>
        <div class="form-group">
          <label class="form-label">电子邮箱</label>
          <input class="form-input" id="registerEmail" type="email" placeholder="请输入电子邮箱（可选）">
        </div>
        <div class="form-group">
          <label class="form-label">手机号码</label>
          <input class="form-input" id="registerPhone" placeholder="请输入手机号码（可选）">
        </div>
        <button class="btn btn-blue" style="width:100%;justify-content:center;padding:14px;" onclick="doRegister()">注 册</button>
      </div>

      <div style="margin-top:20px;text-align:center;">
        <a href="index.html" style="color:var(--text3);font-size:13px;">← 返回首页</a>
      </div>
    </div>
  </div>

  <script src="common-enhanced.js"></script>
  <script>
    // 切换到登录表单
    function switchToLogin() {
      document.getElementById('loginTab').classList.add('active');
      document.getElementById('registerTab').classList.remove('active');
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
    }

    // 切换到注册表单
    function switchToRegister() {
      document.getElementById('registerTab').classList.add('active');
      document.getElementById('loginTab').classList.remove('active');
      document.getElementById('registerForm').classList.remove('hidden');
      document.getElementById('loginForm').classList.add('hidden');
    }

    // 处理Enter键
    document.addEventListener('DOMContentLoaded', function() {
      // 登录表单Enter键
      document.getElementById('loginUser')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doLogin();
      });
      document.getElementById('loginPass')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doLogin();
      });

      // 注册表单Enter键
      document.getElementById('registerUser')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doRegister();
      });
      document.getElementById('registerPass')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doRegister();
      });
      document.getElementById('registerConfirmPass')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doRegister();
      });
    });
  </script>
</body>
</html>
