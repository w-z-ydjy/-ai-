<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线答题 - 人工智能协会 · 党建文化平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toast -->
  <div id="toast"></div>

  <!-- Top Navigation -->
  <nav id="topnav">
    <div class="nav-wrap">
      <div class="nav-logo" onclick="window.location.href='index.html'">
        <div class="nav-logo-icon">★</div>
        <div><div class="nav-logo-text">人工智能协会 · 党建文化</div></div>
      </div>
      <div class="nav-right" id="navRight" style="margin-left:auto;">
        <button class="nav-btn" onclick="toggleTheme()">🌙 深色</button>
        <a href="study.html" class="nav-btn btn-outline" style="margin-left:8px;">← 返回学习中心</a>
      </div>
    </div>
  </nav>

  <div style="padding-top:var(--nav-h);">
    <div class="section">
      <div class="quiz-wrap">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;">
          <div><div class="sec-tag">KNOWLEDGE QUIZ</div><h2 class="sec-title">党建<span>知识测验</span></h2></div>
          <div style="font-size:14px;color:var(--text3);">第 <span id="quizCurrent">1</span> / <span id="quizTotal">10</span> 题</div>
        </div>
        <div class="quiz-progress"><div class="quiz-progress-bar" id="quizProgressBar" style="width:10%;"></div></div>

        <!-- 加载状态 -->
        <div id="quizLoading" class="card" style="padding:48px;text-align:center;">
          <div style="font-size:48px;margin-bottom:20px;">⏳</div>
          <h3 style="font-size:18px;margin-bottom:12px;">正在加载题目...</h3>
          <p style="color:var(--text2);font-size:14px;">请稍候，正在从服务器获取题目数据</p>
        </div>

        <!-- 答题界面 -->
        <div class="card" style="padding:36px;display:none;" id="quizCard">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <span class="badge" id="quizTypeBadge" style="background:var(--blue);color:#fff;padding:6px 12px;border-radius:4px;font-size:13px;">单选题</span>
            <div class="quiz-q" id="quizQuestion"></div>
          </div>
          <div class="quiz-options" id="quizOptions"></div>
          <div style="margin-top:28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
            <button class="btn btn-outline btn-sm" onclick="confirmQuitQuiz()">退出答题</button>
            <button class="btn btn-blue" id="quizNextBtn" onclick="quizNext()" style="display:none;">下一题 →</button>
          </div>
        </div>

        <!-- 答题结果 -->
        <div id="quizResult" style="display:none;">
          <div class="card" style="padding:48px;text-align:center;">
            <div style="font-size:72px;margin-bottom:20px;" id="quizResultIcon">🎉</div>
            <h2 style="font-size:28px;font-weight:700;margin-bottom:12px;" id="quizResultTitle">答题完成！</h2>
            <p style="font-size:16px;color:var(--text2);margin-bottom:8px;" id="quizResultScore"></p>
            <p style="font-size:14px;color:var(--text3);margin-bottom:28px;" id="quizResultMsg"></p>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
              <button class="btn btn-red" onclick="restartQuiz()">🔄 重新答题</button>
              <a href="study.html" class="btn btn-blue">🏆 返回排行</a>
              <button class="btn btn-green" id="saveRecordBtn" onclick="saveQuizRecord()">💾 保存记录</button>
            </div>
          </div>
        </div>

        <!-- 错误状态 -->
        <div id="quizError" class="card" style="padding:48px;text-align:center;display:none;">
          <div style="font-size:48px;margin-bottom:20px;">❌</div>
          <h3 style="font-size:18px;margin-bottom:12px;">加载题目失败</h3>
          <p style="color:var(--text2);font-size:14px;margin-bottom:20px;" id="quizErrorMsg">无法连接到服务器，请检查网络连接或稍后重试</p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <button class="btn btn-blue" onclick="window.location.reload()">🔄 重新加载</button>
            <a href="study.html" class="btn btn-outline">← 返回学习中心</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="common-enhanced.js"></script>
  <script>
    // 答题状态变量
    let quizQ = 0, quizScore = 0, quizAnswered = false, wrongQuestions = [], selectedAnswers = [];
    let currentQuizData = [];
    let quizStartTime = null;
    let quizEndTime = null;

    // 初始化答题
    async function initQuiz() {
      quizQ = 0; quizScore = 0; quizAnswered = false; wrongQuestions = []; selectedAnswers = [];
      quizStartTime = new Date();

      // 显示加载状态
      document.getElementById('quizLoading').style.display = '';
      document.getElementById('quizCard').style.display = 'none';
      document.getElementById('quizResult').style.display = 'none';
      document.getElementById('quizError').style.display = 'none';

      try {
        // 从API获取随机题目（10道）
        currentQuizData = await getRandomQuestions(10);

        if (currentQuizData.length === 0) {
          // 如果没有获取到题目，显示错误
          showQuizError('服务器返回的题目为空，请检查数据库配置');
          return;
        }

        // 格式化题目数据为前端所需格式
        currentQuizData = currentQuizData.map(q => {
          const typeMap = { '单选': 'single', '多选': 'multiple', '判断': 'judgment' };
          const options = [];
          let answer;

          if (q.type === '判断') {
            options.push(q.option_a || '对', q.option_b || '错');
            answer = q.answer === '对' ? 0 : 1;
          } else if (q.type === '多选') {
            // 多选题答案可能是"A,B,C"格式
            const answerStr = q.answer || '';
            const answerIndices = [];
            if (answerStr.includes('A')) answerIndices.push(0);
            if (answerStr.includes('B')) answerIndices.push(1);
            if (answerStr.includes('C')) answerIndices.push(2);
            if (answerStr.includes('D')) answerIndices.push(3);
            answer = answerIndices;

            options.push(
              q.option_a || '',
              q.option_b || '',
              q.option_c || '',
              q.option_d || ''
            );
          } else {
            // 单选题
            const answerStr = q.answer || 'A';
            answer = answerStr.charCodeAt(0) - 65; // A->0, B->1, C->2, D->3

            options.push(
              q.option_a || '',
              q.option_b || '',
              q.option_c || '',
              q.option_d || ''
            );
          }

          return {
            id: q.id,
            q: q.title,
            opts: options.filter(opt => opt !== null && opt !== ''),
            ans: answer,
            type: typeMap[q.type] || 'single',
            original: q
          };
        });

        // 隐藏加载状态，显示答题界面
        document.getElementById('quizLoading').style.display = 'none';
        document.getElementById('quizCard').style.display = '';
        document.getElementById('quizTotal').textContent = currentQuizData.length;
        renderQuiz();

      } catch (error) {
        console.error('初始化答题失败:', error);
        showQuizError('获取题目失败: ' + (error.message || '未知错误'));
      }
    }

    function showQuizError(message) {
      document.getElementById('quizLoading').style.display = 'none';
      document.getElementById('quizError').style.display = '';
      document.getElementById('quizErrorMsg').textContent = message;
    }

    function renderQuiz() {
      if (quizQ >= currentQuizData.length) { showResult(); return; }
      quizAnswered = false;
      const d = currentQuizData[quizQ];
      document.getElementById('quizCurrent').textContent = quizQ + 1;
      document.getElementById('quizProgressBar').style.width = ((quizQ / currentQuizData.length) * 100) + '%';
      document.getElementById('quizQuestion').textContent = (quizQ + 1) + '. ' + d.q;

      const typeBadge = document.getElementById('quizTypeBadge');
      if (d.type === 'multiple') {
        typeBadge.textContent = '多选题';
        typeBadge.style.background = 'var(--red)';
      } else if (d.type === 'judgment') {
        typeBadge.textContent = '判断题';
        typeBadge.style.background = 'var(--blue)';
      } else {
        typeBadge.textContent = '单选题';
        typeBadge.style.background = 'var(--blue)';
      }

      document.getElementById('quizNextBtn').style.display = 'none';
      selectedAnswers = [];

      if (d.type === 'multiple') {
        document.getElementById('quizOptions').innerHTML = d.opts.map((o, i) => `
          <button class="quiz-option" onclick="toggleMultipleChoice(${i})" id="opt-${i}">
            <div class="quiz-option-key">${String.fromCharCode(65 + i)}</div>${o}
          </button>`).join('') + `
          <button class="btn btn-red" id="confirmMultipleBtn" onclick="checkMultipleChoice()" style="margin-top:20px;width:100%;justify-content:center;">确认答案</button>`;
      } else if (d.type === 'judgment') {
        document.getElementById('quizOptions').innerHTML = d.opts.map((o, i) => `
          <button class="quiz-option" onclick="selectAnswer(${i})">
            <div class="quiz-option-key">${i === 0 ? '√' : '×'}</div>${o}
          </button>`).join('');
      } else {
        const keys = ['A', 'B', 'C', 'D'];
        document.getElementById('quizOptions').innerHTML = d.opts.map((o, i) => `
          <button class="quiz-option" onclick="selectAnswer(${i})">
            <div class="quiz-option-key">${keys[i]}</div>${o}
          </button>`).join('');
      }
    }

    function selectAnswer(i) {
      if (quizAnswered) return;
      quizAnswered = true;
      const d = currentQuizData[quizQ];
      const opts = document.querySelectorAll('.quiz-option');

      opts.forEach((o, idx) => {
        if (idx === d.ans) o.classList.add('correct');
        else if (idx === i) o.classList.add('wrong');
        o.disabled = true;
      });

      if (i === d.ans) quizScore++;

      document.getElementById('quizNextBtn').style.display = 'inline-flex';
    }

    function toggleMultipleChoice(i) {
      if (quizAnswered) return;
      const option = document.querySelectorAll('.quiz-option')[i];
      const isSelected = option.classList.contains('selected');

      if (isSelected) {
        option.classList.remove('selected');
        selectedAnswers = selectedAnswers.filter(idx => idx !== i);
      } else {
        option.classList.add('selected');
        selectedAnswers.push(i);
      }
    }

    function checkMultipleChoice() {
      if (quizAnswered) return;
      quizAnswered = true;

      const d = currentQuizData[quizQ];
      const opts = document.querySelectorAll('.quiz-option');
      let isCorrect = true;

      opts.forEach((o, idx) => {
        if (d.ans.includes(idx)) {
          o.classList.add('correct');
          if (!selectedAnswers.includes(idx)) isCorrect = false;
        } else {
          if (selectedAnswers.includes(idx)) {
            o.classList.add('wrong');
            isCorrect = false;
          }
        }
        o.disabled = true;
      });

      const confirmBtn = document.getElementById('confirmMultipleBtn');
      if (confirmBtn) confirmBtn.style.display = 'none';

      if (isCorrect) quizScore++;

      document.getElementById('quizNextBtn').style.display = 'inline-flex';
    }

    function quizNext() {
      quizQ++;
      renderQuiz();
    }

    function showResult() {
      quizEndTime = new Date();
      const timeSpent = Math.round((quizEndTime - quizStartTime) / 1000);

      document.getElementById('quizCard').style.display = 'none';
      document.getElementById('quizResult').style.display = '';

      const percent = Math.round((quizScore / currentQuizData.length) * 100);
      document.getElementById('quizResultIcon').textContent = percent >= 60 ? '🎉' : '📚';
      document.getElementById('quizResultTitle').textContent = percent >= 60 ? '答题完成！' : '继续加油！';
      document.getElementById('quizResultScore').textContent = `正确率：${percent}%（${quizScore}/${currentQuizData.length}）`;
      document.getElementById('quizResultMsg').textContent = percent >= 80 ? '太棒了！您对党建知识掌握得非常扎实！' : percent >= 60 ? '不错！继续学习可以做得更好！' : '建议您加强党建知识的学习！';

      // 显示保存记录按钮（仅限已登录用户）
      const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
      const saveRecordBtn = document.getElementById('saveRecordBtn');
      if (saveRecordBtn) {
        saveRecordBtn.style.display = isLoggedIn ? 'inline-flex' : 'none';
      }
    }

    // 保存答题记录到服务器
    async function saveQuizRecord() {
      const isLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
      if (!isLoggedIn) {
        showToast('❌ 请先登录以保存答题记录', 'error');
        return;
      }

      const timeSpent = Math.round((quizEndTime - quizStartTime) / 1000);
      const score = Math.round((quizScore / currentQuizData.length) * 100);

      // 构建答题详情数据
      const quizData = currentQuizData.map((q, index) => ({
        question_id: q.id,
        question: q.q,
        options: q.opts,
        correct_answer: q.ans,
        user_answer: index < quizQ ? (q.type === 'multiple' ? selectedAnswers : q.ans) : null,
        is_correct: index < quizQ ? (q.type === 'multiple' ? JSON.stringify(q.ans.sort()) === JSON.stringify(selectedAnswers.sort()) : q.ans === selectedAnswers) : false
      }));

      const record = {
        total_questions: currentQuizData.length,
        correct_answers: quizScore,
        score: score,
        time_spent: timeSpent,
        quiz_data: quizData
      };

      try {
        const success = await submitQuizRecord(record);
        if (success) {
          showToast('✅ 答题记录保存成功！');
          document.getElementById('saveRecordBtn').disabled = true;
          document.getElementById('saveRecordBtn').textContent = '💾 已保存';
        } else {
          showToast('❌ 保存记录失败，请稍后重试', 'error');
        }
      } catch (error) {
        console.error('保存记录失败:', error);
        showToast('❌ 保存记录失败: ' + (error.message || '未知错误'), 'error');
      }
    }

    function restartQuiz() {
      initQuiz();
    }

    function confirmQuitQuiz() {
      if (confirm('确定要退出答题吗？您的进度将不会保存。')) {
        window.location.href = 'study.html';
      }
    }

    // 页面加载时初始化答题
    document.addEventListener('DOMContentLoaded', function() {
      initQuiz();
    });
  </script>
</body>
</html>
